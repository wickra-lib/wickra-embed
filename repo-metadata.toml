# Single source of truth for repo-level identity (org slug, maintainer email,
# canonical URLs). Mirrors the convention used in the main `wickra` repository.

[repo]
org          = "wickra-lib"
name         = "wickra-embed"
url          = "https://github.com/wickra-lib/wickra-embed"
homepage     = "https://wickra.org"
issues_url   = "https://github.com/wickra-lib/wickra-embed/issues"
security_url = "https://github.com/wickra-lib/wickra-embed/security/advisories/new"

[maintainer]
# `handle` is the natural-person credit shown in package manifests; it does not
# move with a GitHub org transfer. `github` is the org @-mention slug used in
# CODEOWNERS and prose.
handle = "kingchenc"
email  = "support@wickra.org"
github = "wickra-lib"

[badges]
ci_workflow = "ci.yml"

[audit]
# Forbidden substrings that must not appear in source (the pre-org-migration
# repo path). Kept in lock-step with the main repository's convention.
forbidden = [
    "kingchenc/wickra-embed",
]

# Paths exempt from the forbidden-substring scan: auto-generated / lockfiles and
# the two files that legitimately spell the forbidden value out (this file
# defines it; the audit script matches against it).
allowlist = [
    "target/",
    "fuzz/target/",
    "examples/embedded/target/",
    "Cargo.lock",
    "repo-metadata.toml",
    ".github/scripts/sync-metadata.py",
]
