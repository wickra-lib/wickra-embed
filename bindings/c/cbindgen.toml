language = "C"
header = "/* wickra-embed no-alloc C ABI — generated by cbindgen; do not edit by hand. */"
include_guard = "WICKRA_EMBED_H"
pragma_once = true
cpp_compat = true
tab_width = 4
documentation = true
documentation_style = "c99"
style = "type"

[fn]
sort_by = "None"

[parse]
# The indicator handles wrap const-generic core types (`Sma<20>`, `Atr<14>`, …).
# We deliberately do NOT parse the core crate: leaving those field types
# unresolved makes cbindgen emit each handle as an opaque, forward-declared
# struct — exactly the caller-allocated, caller-never-dereferences contract we
# want. The handle sizes/alignments are exposed via the `*_size`/`*_align`
# accessor functions instead.
parse_deps = false
