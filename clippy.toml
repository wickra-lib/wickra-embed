# Clippy thresholds. Lint levels (clippy::all / pedantic) live in the workspace
# Cargo.toml under [workspace.lints]; this file holds configurable thresholds.
too-many-arguments-threshold = 8

# Embedded / DSP identifiers with embedded capitals (and O(1)) that the
# doc_markdown lint would otherwise flag as un-backticked identifiers. `..`
# keeps clippy's default allowlist.
doc-valid-idents = [
    "SMA",
    "EMA",
    "RSI",
    "ATR",
    "ROC",
    "OHLCV",
    "MCU",
    "FPU",
    "HFT",
    "QEMU",
    "Cortex-M",
    "O(1)",
    "..",
]
