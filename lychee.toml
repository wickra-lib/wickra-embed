# Configuration for the lychee link checker (used by the links CI workflow).

# Treat these as success in addition to 2xx.
accept = [200, 206, 429]

# Retry transient failures.
max_retries = 3
retry_wait_time = 2

# Don't hammer hosts.
max_concurrency = 8

# Skip checking anchors within pages (heading fragments) — too noisy.
include_fragments = false

# Exclude links that are not meant to resolve at check time: localhost,
# example/placeholder hosts, and the crates.io URL that 404s until a release is
# published. This repo ships only the `embed-core` crate (no PyPI/npm/NuGet/
# Maven/Go packages).
exclude = [
    "^https?://localhost",
    "^https?://127\\.0\\.0\\.1",
    "example\\.com",
    "^https?://crates\\.io/crates/embed-core",
    # Workflow status badges resolve only once the workflow exists on the default
    # branch and has run; they 404 when checked from a feature branch pre-merge.
    "github\\.com/wickra-lib/wickra-embed/actions",
]
