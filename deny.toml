# cargo-deny configuration — supply-chain gate (advisories, licenses, bans, sources).

[advisories]
version = 2
yanked = "deny"
# Suppressed advisories (assessed as not affecting wickra-embed). Keep in
# lock-step with osv-scanner.toml.
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
