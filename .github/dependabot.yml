version: 2
updates:
  # Rust host workspace (root Cargo.toml + all member crates). There are no
  # npm/pip/maven/nuget/gomod ecosystems here — wickra-embed ships no language
  # bindings beyond the C ABI, which has no package manifest of its own.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps(cargo)"
    groups:
      cargo:
        patterns: ["*"]

  # GitHub Actions — keeps the SHA-pinned actions current (Dependabot reads
  # the version comment after each pinned SHA and bumps both together).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps(actions)"
    # dtolnay/rust-toolchain@<channel> pins a Rust toolchain (e.g. 1.86 for the
    # MSRV job), not an action version. Dependabot misreads the channel as a
    # version and proposes non-existent Rust releases. The toolchain pins are
    # managed manually with the MSRV policy.
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
    groups:
      github-actions:
        patterns: ["*"]
