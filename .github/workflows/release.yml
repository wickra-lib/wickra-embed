name: Release

# USER-GO / HARD-STOP: this runs only on a pushed `v*` tag and performs the
# irreversible crates.io publish of embed-core plus the GitHub release. Never tag
# without explicit approval. There are no PyPI / npm / NuGet / Maven / Go /
# r-universe steps — this product is C-ABI-only, so the language bindings that
# other Wickra crates publish do not exist here. The C ABI ships as prebuilt
# no-alloc staticlibs for the two bare-metal triples and the host, attached as
# release assets rather than published to a registry.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"

jobs:
  publish-crates:
    name: Publish embed-core to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      # Only the no_std core is a library crate for downstream Rust firmware. The
      # C ABI crate (wickra-embed-c) is a staticlib/cdylib artifact, not a
      # registry dependency, so it is shipped as a release asset instead.
      - name: Publish embed-core
        run: cargo publish -p embed-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  staticlibs:
    name: C ABI staticlib (${{ matrix.target }})
    needs: publish-crates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - thumbv7em-none-eabihf
          - thumbv6m-none-eabi
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
      # The bare-metal targets cannot build a cdylib (no dynamic linker), so ask
      # rustc for the staticlib crate-type only. That yields a uniform
      # `libwickra_embed.a` for every triple, which firmware links directly.
      - name: Build the no-alloc C ABI staticlib
        run: cargo rustc -p wickra-embed-c --release --target ${{ matrix.target }} --crate-type staticlib
      - name: Package the staticlib and header
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist stage
          cp "target/${TARGET}/release/libwickra_embed.a" stage/
          cp bindings/c/include/wickra_embed.h stage/
          cp LICENSE-MIT LICENSE-APACHE stage/
          tar -C stage -czf "dist/wickra-embed-c-${REF_NAME}-${TARGET}.tar.gz" .
      - name: Upload staticlib artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staticlib-${{ matrix.target }}
          path: dist/*.tar.gz

  github-release:
    name: Draft, attach, publish
    needs: staticlibs
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release + upload assets
      id-token: write # SLSA build provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download staticlib artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: dist/sbom.cyclonedx.json
      - name: Attest build provenance for the release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v2
        with:
          subject-path: dist/*.tar.gz
      # Draft first so a partial asset upload never surfaces a half-baked
      # release; the release stays hidden until the publish step flips it live.
      - name: Create the draft release and attach assets
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/sbom.cyclonedx.json
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release edit "$REF_NAME" --draft=false --repo "$REPO"
