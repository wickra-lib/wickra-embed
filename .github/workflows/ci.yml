name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_RETRY: "10"
  RUSTFLAGS: "-D warnings"

# embed-core is `#![no_std]` and allocation-free. The host jobs (fmt, clippy,
# test) run with the default `std` feature; the `build-no_std` matrix cross-
# compiles the core with `--no-default-features` to the bare-metal targets and
# doubles as the allocation-leak guard: the build fails the moment anything pulls
# `std`/`alloc` in. Security scans, coverage, fuzzing and the C ABI land with the
# later phases.

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (host + no_std)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Clippy the host workspace (std)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Clippy the no_std core on a bare-metal target
        run: cargo clippy -p embed-core --no-default-features --target thumbv7em-none-eabihf -- -D warnings

  build-no_std:
    name: Build no_std (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [thumbv7em-none-eabihf, thumbv6m-none-eabi]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # No `--all-targets`: tests and doctests need std. A pure lib build of the
      # no-alloc core is the allocation-leak guard — it fails if `std`/`alloc` is
      # pulled in.
      - run: cargo build -p embed-core --no-default-features --target ${{ matrix.target }}

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --workspace --all-features

  msrv:
    name: MSRV (1.86)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.86"
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check the host workspace
        run: cargo check --workspace --all-features
      - name: Check the no_std core on a bare-metal target
        run: cargo check -p embed-core --no-default-features --target thumbv7em-none-eabihf

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check advisories bans sources licenses

  links:
    name: External links (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --config lychee.toml --no-progress --root-dir "${{ github.workspace }}" "*.md" "crates/embed-core/README.md"
          fail: true
